<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 컬렉션 보드</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 영화 포스터 스타일 카드 컴포넌트
        function MovieCard({ movie, onClick }) {
            return (
                <div 
                    className="relative bg-slate-800 rounded-xl overflow-hidden shadow-lg cursor-pointer group aspect-[2/3] border border-slate-800 hover:border-slate-600 transition-colors duration-300"
                    onClick={() => onClick(movie)}
                >
                    <img 
                        src={movie.posterUrl} 
                        alt={movie.title}
                        className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                        onError={(e) => { e.target.style.display = 'none'; }}
                    />
                    
                    <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/50 to-transparent opacity-80 group-hover:opacity-90 transition-opacity duration-300"></div>
                    
                    <div className="absolute inset-x-0 bottom-0 p-4 sm:p-5 flex flex-col justify-end h-1/2 translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
                        <h2 className="text-lg sm:text-xl font-bold text-white mb-2 line-clamp-2 drop-shadow-md">
                            {movie.title}
                        </h2>
                        
                        <div className="flex flex-wrap gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-100">
                            {movie.tags && movie.tags.slice(0, 3).map((tag, idx) => (
                                <span key={idx} className="bg-white/20 backdrop-blur-sm text-white text-[10px] sm:text-xs font-medium px-2 py-1 rounded-md">
                                    #{tag}
                                </span>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // 영화 상세 페이지 컴포넌트
        function MovieDetail({ movie, onBack }) {
            return (
                <div className="max-w-6xl mx-auto py-8 px-4 sm:px-6 animate-fade-in">
                    <button 
                        onClick={onBack}
                        className="mb-8 px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-xl transition-colors flex items-center gap-2 border border-slate-700 shadow-sm group"
                    >
                        <svg className="w-5 h-5 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        돌아가기
                    </button>

                    <div className="relative rounded-3xl overflow-hidden shadow-2xl border border-slate-700 mb-12 group">
                        <div className="absolute inset-0">
                            <img src={movie.posterUrl} className="w-full h-full object-cover blur-xl opacity-30 scale-110" alt="background blur" />
                            <div className="absolute inset-0 bg-slate-900/60"></div>
                        </div>

                        <div className="relative p-6 sm:p-10 z-10 flex flex-col md:flex-row gap-8 items-start">
                            <img src={movie.posterUrl} alt={movie.title} className="w-48 sm:w-64 rounded-2xl shadow-xl border border-slate-600/50 shrink-0 object-cover aspect-[2/3]" />
                            
                            <div className="flex-1">
                                <h1 className="text-3xl sm:text-5xl font-extrabold mb-6 text-white tracking-tight drop-shadow-lg">{movie.title}</h1>
                                <div className="flex flex-wrap gap-2 mb-8">
                                    {movie.tags && movie.tags.map((tag, idx) => (
                                        <span key={idx} className="bg-indigo-500/30 text-indigo-200 text-sm font-medium px-4 py-1.5 rounded-full border border-indigo-400/30 backdrop-blur-md">
                                            {tag}
                                        </span>
                                    ))}
                                </div>
                                
                                <div className="bg-slate-900/60 backdrop-blur-md rounded-2xl p-6 border border-slate-700/50">
                                    <h3 className="text-xl font-semibold mb-4 text-slate-200 flex items-center gap-2">
                                        <svg className="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                                        시놉시스
                                    </h3>
                                    <p className="text-slate-300 text-lg leading-loose whitespace-pre-wrap">
                                        {movie.synopsis}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h3 className="text-2xl font-bold mb-6 px-2 text-white flex items-center gap-3">
                            <svg className="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            스틸컷 갤러리
                        </h3>
                        {/* 더 이상 랜덤 이미지가 아닌, 영화에 맞게 엄선된 스틸컷 배열(gallery)을 보여줍니다. */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-4 sm:gap-6">
                            {movie.gallery && movie.gallery.map((src, idx) => (
                                <img 
                                    key={idx}
                                    src={src} 
                                    alt={`${movie.title} 스틸컷 ${idx + 1}`}
                                    className="w-full aspect-video object-cover rounded-xl shadow-lg border border-slate-700 hover:scale-105 transition-transform duration-300"
                                />
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [movies, setMovies] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedMovie, setSelectedMovie] = useState(null);

            useEffect(() => {
                // 각 영화의 내용과 100% 매칭되는 포스터 및 갤러리 스틸컷 이미지들
                setTimeout(() => {
                    setMovies([
                        {
                            "id": "salmokji",
                            "title": "살목지 : Whispering Water",
                            "synopsis": "기이한 소문이 끊이지 않는 저수지 '살목지'. 그곳에 얽힌 오랜 저주와 비밀을 파헤치기 위해 찾아온 사람들은 점차 알 수 없는 환청과 기현상에 시달리기 시작하는데...",
                            "tags": ["미스터리", "스릴러", "공포"],
                            "posterUrl": "https://images.unsplash.com/photo-1519004908953-909d949ec384?q=80&w=800&auto=format&fit=crop", // 안개 낀 호수와 사람
                            "gallery": [
                                "https://images.unsplash.com/photo-1511216113906-8f56bbce4205?q=80&w=1200&auto=format&fit=crop", // 스산한 물가
                                "https://images.unsplash.com/photo-1483363024888-2fc8c63f68ea?q=80&w=1200&auto=format&fit=crop", // 버려진 나룻배
                                "https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=1200&auto=format&fit=crop", // 어두운 터널/숲
                                "https://images.unsplash.com/photo-1437435133379-37fbe40c0f99?q=80&w=1200&auto=format&fit=crop"  // 물 속으로 이어지는 계단
                            ]
                        },
                        {
                            "id": "darkknight",
                            "title": "미드나잇 시티 : 범죄의 재구성",
                            "synopsis": "비가 내리는 도시의 뒷골목. 쫓는 자와 쫓기는 자의 숨막히는 두뇌 싸움이 시작된다. 정의라는 이름 아래 감춰진 추악한 진실이 드러난다.",
                            "tags": ["액션", "범죄", "느와르"],
                            "posterUrl": "https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=800&auto=format&fit=crop", // 비오는 네온 밤거리의 남자
                            "gallery": [
                                "https://images.unsplash.com/photo-1509631179647-0177331693ae?q=80&w=1200&auto=format&fit=crop", // 비오는 차창 밖 네온사인
                                "https://images.unsplash.com/photo-1486801931086-4d7a8d874558?q=80&w=1200&auto=format&fit=crop", // 어두운 골목길 실루엣
                                "https://images.unsplash.com/photo-1517554558509-9b62a6375005?q=80&w=1200&auto=format&fit=crop", // 야간 운전 질주 시점
                                "https://images.unsplash.com/photo-1533512966563-7186008b8b32?q=80&w=1200&auto=format&fit=crop"  // 지하도 뒷모습
                            ]
                        },
                        {
                            "id": "space",
                            "title": "프로젝트 K-9 : 우주의 끝",
                            "synopsis": "지구의 자원이 고갈된 2150년. 인류의 새로운 터전을 찾기 위해 떠난 탐사선 K-9호는 알 수 없는 블랙홀에 휘말리게 되고, 그 너머에서 경이로운 존재를 마주한다.",
                            "tags": ["SF", "우주", "블록버스터"],
                            "posterUrl": "https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?q=80&w=800&auto=format&fit=crop", // 우주인 헬멧 포스터
                            "gallery": [
                                "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1200&auto=format&fit=crop", // 우주선에서 바라본 지구
                                "https://images.unsplash.com/photo-1454789548928-9efd52dc4031?q=80&w=1200&auto=format&fit=crop", // 별빛이 쏟아지는 우주
                                "https://images.unsplash.com/photo-1541185933-ef5d8ed016c2?q=80&w=1200&auto=format&fit=crop", // 로켓/우주선 내부 느낌
                                "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1200&auto=format&fit=crop"  // 은하계 성운
                            ]
                        },
                        {
                            "id": "romance",
                            "title": "한여름 밤의 기적",
                            "synopsis": "우연히 떠난 여름 휴가지에서 만난 두 사람. 짧지만 강렬했던 3일간의 기억이 그들의 인생을 완전히 바꾸어 놓는다.",
                            "tags": ["로맨스", "드라마", "감동"],
                            "posterUrl": "https://images.unsplash.com/photo-1474552226712-ac0f0961a954?q=80&w=800&auto=format&fit=crop", // 노을지는 바닷가의 연인
                            "gallery": [
                                "https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=1200&auto=format&fit=crop", // 맞잡은 손
                                "https://images.unsplash.com/photo-1499209974431-9dddcece7f88?q=80&w=1200&auto=format&fit=crop", // 여름 해변을 걷는 두 사람
                                "https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=1200&auto=format&fit=crop", // 감성적인 카페 공간
                                "https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?q=80&w=1200&auto=format&fit=crop"  // 아름다운 석양
                            ]
                        },
                        {
                            "id": "forest",
                            "title": "깊은 숲 속으로",
                            "synopsis": "아무도 돌아오지 못한 안개 낀 숲. 길을 잃은 등산객들은 자신들이 숲의 일부가 되어가고 있다는 끔찍한 사실을 깨닫는다.",
                            "tags": ["스릴러", "반전", "생존"],
                            "posterUrl": "https://images.unsplash.com/photo-1501554728187-ce583db33af7?q=80&w=800&auto=format&fit=crop", // 어두운 숲길의 실루엣
                            "gallery": [
                                "https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1200&auto=format&fit=crop", // 어둡고 빽빽한 나무들
                                "https://images.unsplash.com/photo-1513836279014-a89f7a76ae86?q=80&w=1200&auto=format&fit=crop", // 안개 자욱한 산길
                                "https://images.unsplash.com/photo-1478476868527-002ae3f3e159?q=80&w=1200&auto=format&fit=crop", // 버려진 오두막
                                "https://images.unsplash.com/photo-1505533321630-975218a5f66f?q=80&w=1200&auto=format&fit=crop"  // 진흙 속 누군가의 흔적
                            ]
                        }
                    ]);
                    setLoading(false);
                }, 400);
            }, []);

            if (loading) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen">
                        <div className="w-16 h-16 border-4 border-slate-700 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
                        <div className="text-xl font-semibold text-slate-400 font-mono tracking-widest">LOADING...</div>
                    </div>
                );
            }

            return (
                <main className="container mx-auto px-4 py-12 max-w-7xl">
                    {selectedMovie ? (
                        <MovieDetail 
                            movie={selectedMovie} 
                            onBack={() => setSelectedMovie(null)} 
                        />
                    ) : (
                        <div>
                            <header className="mb-12 text-center">
                                <h1 className="text-4xl md:text-6xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-emerald-400 tracking-tight">
                                    CINEMA BOARD
                                </h1>
                                <p className="text-slate-400 text-lg font-medium">당신을 위한 영감의 영화 컬렉션</p>
                            </header>
                            
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6">
                                {movies.map((movie) => (
                                    <MovieCard 
                                        key={movie.id} 
                                        movie={movie} 
                                        onClick={setSelectedMovie} 
                                    />
                                ))}
                            </div>
                        </div>
                    )}
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
